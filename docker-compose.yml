version: '3.8'

services:
  # PostgreSQL база данных
  db:
    image: postgres:13
    container_name: diplom_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: diplom_db
      POSTGRES_USER: diplom_user
      POSTGRES_PASSWORD: diplom_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diplom_user -d diplom_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplom_network

  # Redis для Celery
  redis:
    image: redis:7-alpine
    container_name: diplom_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diplom_network

  # Django веб-приложение
  web:
    build: .
    container_name: diplom_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=diplom_db
      - DB_USER=diplom_user
      - DB_PASSWORD=diplom_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    entrypoint: /app/entrypoint.sh
    networks:
      - diplom_network

  # Celery worker
  celery:
    build: .
    container_name: diplom_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=diplom_db
      - DB_USER=diplom_user
      - DB_PASSWORD=diplom_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    entrypoint: /app/entrypoint.sh
    networks:
      - diplom_network

  # Celery beat
  celery-beat:
    build: .
    container_name: diplom_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=diplom_db
      - DB_USER=diplom_user
      - DB_PASSWORD=diplom_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    entrypoint: /app/entrypoint.sh
    networks:
      - diplom_network

volumes:
  postgres_data:

networks:
  diplom_network:
    driver: bridge
